version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: baicizhan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: baicizhan
      MYSQL_USER: bcz
      MYSQL_PASSWORD: bczpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password"]

  api:
    build:
      context: ./backend
    container_name: baicizhan_api
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql+pymysql://bcz:bczpass@mysql:3306/baicizhan?charset=utf8mb4
      CORS_ORIGINS: "*"
      SEED_ON_STARTUP: "true"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app

volumes:
  mysql_data:
